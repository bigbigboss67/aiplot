<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Plot - User Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ffffff;
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #8892b0;
            text-align: center;
            margin-bottom: 30px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a2744;
            border: 1px solid #2a3f6f;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #8892b0;
            font-size: 14px;
        }
        .controls {
            background: #1a2744;
            border: 1px solid #2a3f6f;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .controls input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            background: #0a1628;
            border: 1px solid #2a3f6f;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        .controls input:focus {
            border-color: #3b82f6;
        }
        .btn {
            padding: 12px 24px;
            background: #3b82f6;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #2563eb;
        }
        .btn-success {
            background: #10b981;
        }
        .btn-success:hover {
            background: #059669;
        }
        .btn-warning {
            background: #f59e0b;
        }
        .btn-warning:hover {
            background: #d97706;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .users-table {
            background: #1a2744;
            border: 1px solid #2a3f6f;
            border-radius: 12px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: #0a1628;
        }
        th {
            padding: 16px;
            text-align: left;
            color: #ccd6f6;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 2px solid #2a3f6f;
        }
        td {
            padding: 16px;
            color: #8892b0;
            border-bottom: 1px solid #2a3f6f;
        }
        tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        .status-badge.pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }
        .role-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .action-btns button {
            padding: 6px 12px;
            font-size: 12px;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #8892b0;
        }
        .spinner {
            border: 3px solid #2a3f6f;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8892b0;
        }
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 8px;
            color: #ffffff;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        .message.success {
            background: #10b981;
        }
        .message.error {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Management Panel</h1>
        <p class="subtitle">View and manage all registered users</p>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">-</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="activeUsers">-</div>
                <div class="stat-label">Active Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingUsers">-</div>
                <div class="stat-label">Pending Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="adminUsers">-</div>
                <div class="stat-label">Admin Users</div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search by name or email...">
            <button class="btn" onclick="loadUsers()">🔄 Refresh</button>
            <button class="btn btn-success" onclick="activateAll()">✓ Activate All</button>
        </div>

        <div class="users-table">
            <div id="loadingState" class="loading">
                <div class="spinner"></div>
                <p>Loading users...</p>
            </div>
            
            <div id="emptyState" class="empty-state" style="display: none;">
                <p style="font-size: 48px; margin-bottom: 20px;">👥</p>
                <h3 style="color: #ccd6f6; margin-bottom: 10px;">No Users Found</h3>
                <p>No user accounts have been created yet.</p>
            </div>

            <table id="usersTable" style="display: none;">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, get, update, remove } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyDKthkVZLmK5Y_wT0Jmx90UEkzJs_Pz9-I',
            authDomain: 'plot-ai-87781.firebaseapp.com',
            databaseURL: 'https://plot-ai-87781-default-rtdb.firebaseio.com',
            projectId: 'plot-ai-87781',
            storageBucket: 'plot-ai-87781.firebasestorage.app',
            messagingSenderId: '723228647195',
            appId: '1:723228647195:web:00693e31e923014e1efdbe',
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let allUsers = [];

        window.loadUsers = async function() {
            const loadingState = document.getElementById('loadingState');
            const emptyState = document.getElementById('emptyState');
            const usersTable = document.getElementById('usersTable');
            
            loadingState.style.display = 'block';
            emptyState.style.display = 'none';
            usersTable.style.display = 'none';

            try {
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                
                loadingState.style.display = 'none';
                
                if (!snapshot.exists()) {
                    emptyState.style.display = 'block';
                    return;
                }

                allUsers = [];
                const users = snapshot.val();
                
                for (const [uid, userData] of Object.entries(users)) {
                    allUsers.push({
                        uid,
                        ...userData
                    });
                }

                updateStats();
                renderUsers(allUsers);
                usersTable.style.display = 'table';
                
            } catch (error) {
                console.error('Error loading users:', error);
                loadingState.innerHTML = `<p style="color: #ef4444;">Error loading users: ${error.message}</p>`;
            }
        };

        function updateStats() {
            document.getElementById('totalUsers').textContent = allUsers.length;
            document.getElementById('activeUsers').textContent = allUsers.filter(u => u.status === 'active').length;
            document.getElementById('pendingUsers').textContent = allUsers.filter(u => u.status === 'pending').length;
            document.getElementById('adminUsers').textContent = allUsers.filter(u => u.role === 'admin').length;
        }

        function renderUsers(users) {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            users.forEach(user => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: #ccd6f6; font-weight: 500;">${user.name || 'N/A'}</td>
                    <td>${user.email || 'N/A'}</td>
                    <td><span class="role-badge">${user.role || 'user'}</span></td>
                    <td><span class="status-badge ${user.status || 'pending'}">${user.status || 'pending'}</span></td>
                    <td>${user.createdAt ? new Date(user.createdAt).toLocaleDateString() : 'N/A'}</td>
                    <td>
                        <div class="action-btns">
                            ${(user.status !== 'active') ? `<button class="btn btn-success" onclick="updateUserStatus('${user.uid}', 'active')">Activate</button>` : ''}
                            ${(user.status !== 'pending') ? `<button class="btn btn-warning" onclick="updateUserStatus('${user.uid}', 'pending')">Pending</button>` : ''}
                            ${user.role !== 'admin' ? `<button class="btn" onclick="updateUserRole('${user.uid}', 'admin')">Make Admin</button>` : ''}
                            <button class="btn btn-danger" onclick="deleteUser('${user.uid}', '${user.email}')">Delete</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.updateUserStatus = async function(uid, status) {
            try {
                const userRef = ref(db, `users/${uid}`);
                const snapshot = await get(userRef);
                
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    await update(userRef, {
                        ...userData,
                        status: status,
                        updatedAt: new Date().toISOString()
                    });
                    
                    showMessage(`User status updated to ${status}`, 'success');
                    loadUsers();
                }
            } catch (error) {
                console.error('Error updating user:', error);
                showMessage(`Error: ${error.message}`, 'error');
            }
        };

        window.updateUserRole = async function(uid, role) {
            try {
                const userRef = ref(db, `users/${uid}`);
                const snapshot = await get(userRef);
                
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    await update(userRef, {
                        ...userData,
                        role: role,
                        updatedAt: new Date().toISOString()
                    });
                    
                    showMessage(`User role updated to ${role}`, 'success');
                    loadUsers();
                }
            } catch (error) {
                console.error('Error updating user:', error);
                showMessage(`Error: ${error.message}`, 'error');
            }
        };

        window.deleteUser = async function(uid, email) {
            if (confirm(`Are you sure you want to delete user: ${email}? This action cannot be undone.`)) {
                try {
                    await remove(ref(db, `users/${uid}`));
                    showMessage('User deleted successfully', 'success');
                    loadUsers();
                } catch (error) {
                    console.error('Error deleting user:', error);
                    showMessage(`Error: ${error.message}`, 'error');
                }
            }
        };

        window.activateAll = async function() {
            if (confirm('Activate all pending users?')) {
                try {
                    const updates = {};
                    allUsers.forEach(user => {
                        if (user.status !== 'active') {
                            updates[`users/${user.uid}/status`] = 'active';
                            updates[`users/${user.uid}/updatedAt`] = new Date().toISOString();
                        }
                    });
                    
                    if (Object.keys(updates).length > 0) {
                        await update(ref(db), updates);
                        showMessage('All users activated', 'success');
                        loadUsers();
                    }
                } catch (error) {
                    console.error('Error activating users:', error);
                    showMessage(`Error: ${error.message}`, 'error');
                }
            }
        };

        function showMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = allUsers.filter(user => 
                (user.name && user.name.toLowerCase().includes(searchTerm)) ||
                (user.email && user.email.toLowerCase().includes(searchTerm))
            );
            renderUsers(filtered);
        });

        // Load users on page load
        loadUsers();
    </script>
</body>
</html>
