<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Login - AI Plot Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #2d3748;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            color: #718096;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-login:hover { opacity: 0.9; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.show { display: block; }
        .alert.success { background: #c6f6d5; color: #22543d; }
        .alert.error { background: #fed7d7; color: #742a2a; }
        .alert.info { background: #bee3f8; color: #2a4365; }
        .info-box {
            background: #fefcbf;
            border-left: 4px solid #ecc94b;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1><i class="fas fa-sign-in-alt"></i> Direct Login</h1>
        <p class="subtitle">AI Plot Portal</p>

        <div class="info-box">
            <strong>ℹ️ Info:</strong> This login method uses database verification only (no Firebase Auth required).
        </div>

        <div id="alert" class="alert"></div>

        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login" id="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login to Portal
            </button>
        </form>

        <div class="back-link">
            <a href="#" onclick="showForgotPassword(); return false;">Forgot Password?</a>
        </div>

        <div class="back-link" style="margin-top: 10px;">
            <a href="login.html">← Back to regular login</a>
        </div>
        
        <div class="back-link" style="margin-top: 15px;">
            Don't have an account? <a href="register.html"><strong>Sign Up Now</strong></a>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDKthkVZLmK5Y_wT0Jmx90UEkzJs_Pz9-I",
            authDomain: "plot-ai-87781.firebaseapp.com",
            databaseURL: "https://plot-ai-87781-default-rtdb.firebaseio.com",
            projectId: "plot-ai-87781",
            storageBucket: "plot-ai-87781.firebasestorage.app",
            messagingSenderId: "723228647195",
            appId: "1:723228647195:web:00693e31e923014e1efdbe"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Show alert
        function showAlert(message, type = 'info') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type} show`;
            setTimeout(() => {
                alert.className = 'alert';
            }, 5000);
        }

        // SHA-256 password hashing
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                // Find user in database by email
                const usersRef = db.ref('users');
                const snapshot = await usersRef.orderByChild('email').equalTo(email).once('value');

                if (!snapshot.exists()) {
                    showAlert('❌ No account found with this email', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Portal';
                    return;
                }

                // Get user data
                let userUid = null;
                let userData = null;
                
                snapshot.forEach((childSnapshot) => {
                    userUid = childSnapshot.key;
                    userData = childSnapshot.val();
                });

                // Check if user is active
                if (userData.status !== 'active') {
                    showAlert(`❌ Account status: ${userData.status}. Please contact admin.`, 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Portal';
                    return;
                }

                // Verify password using SHA-256 hash comparison
                const storedHash = userData.passwordHash;
                const inputHash = await hashPassword(password);
                
                if (storedHash) {
                    // User registered with hashed password — verify
                    if (inputHash !== storedHash) {
                        showAlert('❌ Incorrect password. Please try again.', 'error');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Portal';
                        return;
                    }
                } else {
                    // Legacy user without hash — verify plain-text fallback then migrate
                    const storedPlain = userData.password;
                    if (storedPlain && storedPlain !== password) {
                        showAlert('❌ Incorrect password. Please try again.', 'error');
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Portal';
                        return;
                    }
                    // Migrate: save hash and remove plain-text password
                    if (storedPlain) {
                        await db.ref('users/' + userUid).update({
                            passwordHash: inputHash,
                            password: null
                        });
                    }
                }

                // Create session
                const session = {
                    uid: userUid,
                    email: userData.email,
                    name: userData.name,
                    role: userData.role,
                    firebaseAuth: false // Direct database login
                };

                // Save session
                localStorage.setItem('aiplot_session', JSON.stringify(session));

                showAlert('✅ Login successful! Redirecting...', 'success');
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showAlert('❌ Login failed: ' + error.message, 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Portal';
            }
        });
        // Forgot Password flow
        async function showForgotPassword() {
            const email = prompt('Enter your registered email address:');
            if (!email) return;

            const loginBtn = document.getElementById('login-btn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            try {
                // Check if user exists
                const snapshot = await db.ref('users').orderByChild('email').equalTo(email.trim()).once('value');
                if (!snapshot.exists()) {
                    showAlert('❌ No account found with this email.', 'error');
                    return;
                }

                // Generate a 6-digit reset code
                const resetCode = Math.floor(100000 + Math.random() * 900000).toString();
                let userUid = null;
                snapshot.forEach(child => { userUid = child.key; });

                // Save reset code to database with 15-min expiry
                await db.ref('password_resets/' + userUid).set({
                    code: resetCode,
                    email: email.trim(),
                    createdAt: new Date().toISOString(),
                    expiresAt: new Date(Date.now() + 15 * 60 * 1000).toISOString(),
                    used: false
                });

                // Show the reset code modal
                const newPassword = prompt(`A password reset code has been generated.\n\nYour reset code: ${resetCode}\n\n(In production this would be emailed)\n\nEnter your new password:`);
                if (!newPassword || newPassword.length < 6) {
                    showAlert('Password must be at least 6 characters. Reset cancelled.', 'error');
                    return;
                }

                // Verify the reset code
                const codeInput = prompt('Enter the 6-digit reset code to confirm:');
                if (codeInput !== resetCode) {
                    showAlert('❌ Invalid reset code. Please try again.', 'error');
                    return;
                }

                // Hash and save new password
                const newHash = await hashPassword(newPassword);
                await db.ref('users/' + userUid).update({
                    passwordHash: newHash,
                    password: null
                });

                // Mark reset code as used
                await db.ref('password_resets/' + userUid).update({ used: true });

                showAlert('✅ Password reset successful! You can now login with your new password.', 'success');

            } catch (error) {
                console.error('Password reset error:', error);
                showAlert('❌ Password reset failed: ' + error.message, 'error');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Portal';
            }
        }
    </script>
</body>
</html>
