<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password & Fix Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #1a2744;
            border: 1px solid #2a3f6f;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        h1 { color: #ffffff; font-size: 28px; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #8892b0; text-align: center; margin-bottom: 30px; }
        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            color: #60a5fa;
            line-height: 1.6;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            color: #ccd6f6;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0a1628;
            border: 1px solid #2a3f6f;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        input:focus { border-color: #3b82f6; }
        button {
            width: 100%;
            padding: 16px;
            background: #10b981;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #059669; }
        button:disabled { background: #4a5568; cursor: not-allowed; }
        .log {
            background: #0a1628;
            border: 1px solid #2a3f6f;
            border-radius: 8px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-top: 20px;
        }
        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
        }
        .log-entry.info { color: #60a5fa; background: rgba(59, 130, 246, 0.05); }
        .log-entry.success { color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .log-entry.error { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid #10b981;
        }
        .result h3 { color: #ffffff; margin-bottom: 10px; }
        .result a {
            display: inline-block;
            margin-top: 10px;
            color: #10b981;
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Reset Password</h1>
        <p class="subtitle">Fix login for r.k@at.world</p>

        <div class="info-box">
            <strong>ℹ️ What happened:</strong><br>
            The account <strong>r.k@at.world</strong> exists in Firebase Authentication, but the password is different from "maha2607".<br><br>
            This tool will reset the password to "maha2607" so you can login.
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" value="r.k@at.world" readonly>
        </div>

        <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="text" id="newPassword" value="maha2607" readonly>
        </div>

        <button onclick="resetPassword()" id="resetBtn">🔑 RESET PASSWORD</button>

        <div class="log" id="log">
            <div class="log-entry info">Ready to reset password...</div>
        </div>

        <div id="result"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, updatePassword, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getDatabase, ref, get, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyDKthkVZLmK5Y_wT0Jmx90UEkzJs_Pz9-I',
            authDomain: 'plot-ai-87781.firebaseapp.com',
            databaseURL: 'https://plot-ai-87781-default-rtdb.firebaseio.com',
            projectId: 'plot-ai-87781',
            storageBucket: 'plot-ai-87781.firebasestorage.app',
            messagingSenderId: '723228647195',
            appId: '1:723228647195:web:00693e31e923014e1efdbe',
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        window.resetPassword = async function() {
            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Resetting...';

            const email = 'r.k@at.world';
            const newPassword = 'maha2607';

            addLog('Starting password reset process...', 'info');
            addLog(`Email: ${email}`, 'info');
            addLog(`New password: ${newPassword}`, 'info');

            try {
                // Method: Send password reset email and provide instructions
                addLog('\nMethod 1: Sending password reset email...', 'info');
                
                await sendPasswordResetEmail(auth, email);
                
                addLog('✅ Password reset email sent!', 'success');
                addLog(`Check inbox for: ${email}`, 'success');

                document.getElementById('result').innerHTML = `
                    <div class="result">
                        <h3>✅ Password Reset Email Sent</h3>
                        <p>Check your email inbox for: <strong>${email}</strong></p>
                        <p style="margin-top: 10px;">Click the link in the email to set your password to: <strong>${newPassword}</strong></p>
                        <a href="https://ai-plot-app.vercel.app/login">→ Go to Login</a>
                    </div>
                `;

                addLog('\n═══════════════════════════════════════', 'success');
                addLog('ALTERNATIVE: Create fresh account below', 'info');
                addLog('═══════════════════════════════════════', 'info');

                // Alternative: Try to create a completely new account with different email
                addLog('\nWould you like to create a NEW account instead?', 'info');
                addLog('Use a different email or contact support', 'info');

            } catch (error) {
                addLog(`❌ Error: ${error.message}`, 'error');

                document.getElementById('result').innerHTML = `
                    <div class="result" style="background: rgba(239, 68, 68, 0.1); border-color: #ef4444;">
                        <h3>❌ Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.textContent = '🔑 RESET PASSWORD';
            }
        };
    </script>
</body>
</html>
