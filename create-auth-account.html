<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Firebase Auth Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #1a2744;
            border: 1px solid #2a3f6f;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #8892b0;
            margin-bottom: 30px;
        }
        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            color: #60a5fa;
            font-size: 14px;
            line-height: 1.6;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #ccd6f6;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            background: #0a1628;
            border: 1px solid #2a3f6f;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        button:disabled {
            background: #4a5568;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
        }
        .message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            display: block;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            display: block;
        }
        .existing-users {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #2a3f6f;
        }
        .existing-users h3 {
            color: #ffffff;
            margin-bottom: 16px;
        }
        .user-item {
            background: #0a1628;
            border: 1px solid #2a3f6f;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-info {
            flex: 1;
        }
        .user-email {
            color: #ccd6f6;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .user-status {
            color: #8892b0;
            font-size: 12px;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
            width: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Login Account</h1>
        <p class="subtitle">Add your account to Firebase Authentication</p>
        
        <div class="info-box">
            <strong>ℹ️ Why do you need this?</strong><br>
            Your account exists in the database but NOT in Firebase Authentication. 
            You need to create the auth account to be able to login.
        </div>
        
        <form id="createForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Your full name" value="Rassem">
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="your@email.com" value="bigbigboss@windowslive.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Minimum 6 characters" minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required placeholder="Re-enter password" minlength="6">
            </div>
            
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role">
                    <option value="admin" selected>Admin</option>
                    <option value="agent">Agent</option>
                    <option value="manager">Manager</option>
                </select>
            </div>
            
            <button type="submit" id="createBtn">Create Account</button>
        </form>
        
        <div id="message" class="message"></div>

        <div class="existing-users">
            <h3>Existing Database Users (Need Auth)</h3>
            <div id="usersList">Loading...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getDatabase, ref, get, set, update } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyDKthkVZLmK5Y_wT0Jmx90UEkzJs_Pz9-I',
            authDomain: 'plot-ai-87781.firebaseapp.com',
            databaseURL: 'https://plot-ai-87781-default-rtdb.firebaseio.com',
            projectId: 'plot-ai-87781',
            storageBucket: 'plot-ai-87781.firebasestorage.app',
            messagingSenderId: '723228647195',
            appId: '1:723228647195:web:00693e31e923014e1efdbe',
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Load existing users
        async function loadExistingUsers() {
            const usersList = document.getElementById('usersList');
            
            try {
                const usersSnap = await get(ref(db, 'users'));
                
                if (!usersSnap.exists()) {
                    usersList.innerHTML = '<p style="color: #8892b0;">No users in database</p>';
                    return;
                }

                const users = usersSnap.val();
                usersList.innerHTML = '';

                for (const [uid, userData] of Object.entries(users)) {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `
                        <div class="user-info">
                            <div class="user-email">${userData.name || 'N/A'} - ${userData.email}</div>
                            <div class="user-status">Role: ${userData.role || 'user'} | Status: ${userData.status || 'pending'}</div>
                        </div>
                        <button class="btn-small" onclick="quickCreate('${userData.email}', '${userData.name || ''}', '${userData.role || 'admin'}')">Quick Create</button>
                    `;
                    usersList.appendChild(userDiv);
                }
            } catch (error) {
                usersList.innerHTML = `<p style="color: #ef4444;">Error: ${error.message}</p>`;
            }
        }

        window.quickCreate = async function(email, name, role) {
            const password = prompt('Enter a password for this account (minimum 6 characters):');
            
            if (!password || password.length < 6) {
                alert('Password must be at least 6 characters!');
                return;
            }

            document.getElementById('email').value = email;
            document.getElementById('name').value = name;
            document.getElementById('password').value = password;
            document.getElementById('confirmPassword').value = password;
            document.getElementById('role').value = role;
        };

        // Create account form
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            const createBtn = document.getElementById('createBtn');
            const messageDiv = document.getElementById('message');

            if (password !== confirmPassword) {
                showMessage('Passwords do not match!', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters!', 'error');
                return;
            }

            createBtn.disabled = true;
            createBtn.textContent = 'Creating Account...';
            messageDiv.className = 'message';

            try {
                // Create user in Firebase Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Create or update user profile in database
                const existingUserRef = ref(db, `users/${user.uid}`);
                const existingSnap = await get(existingUserRef);

                const userProfile = {
                    name: name,
                    email: email,
                    role: role,
                    status: 'active',
                    phone: existingSnap.exists() ? existingSnap.val().phone || '' : '',
                    createdAt: existingSnap.exists() ? existingSnap.val().createdAt : new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };

                await set(existingUserRef, userProfile);

                showMessage(`✅ Account created successfully!\n\nName: ${name}\nEmail: ${email}\nRole: ${role}\n\nRedirecting to login page...`, 'success');
                
                // Clear form
                document.getElementById('createForm').reset();
                
                // Reload users list
                loadExistingUsers();

                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = 'https://ai-plot-app.vercel.app/login';
                }, 2000);

            } catch (error) {
                console.error('Error creating account:', error);
                let errorMessage = 'Failed to create account. ';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'This email is already registered in Firebase Authentication. You can login with your existing credentials.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Invalid email address format.';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Password should be at least 6 characters.';
                } else {
                    errorMessage += error.message;
                }
                
                showMessage(errorMessage, 'error');
            } finally {
                createBtn.disabled = false;
                createBtn.textContent = 'Create Account';
            }
        });

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }

        // Load users on page load
        loadExistingUsers();
    </script>
</body>
</html>
