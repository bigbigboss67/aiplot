<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Approve Users | AI Plot Portal</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        // Initialize EmailJS
        (function() {
            emailjs.init("bigbigboss67"); // Your EmailJS Public Key
        })();
    </script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f7fafc;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            color: #718096;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #2d3748;
        }

        .stat-card.pending .number {
            color: #ecc94b;
        }

        .stat-card.approved .number {
            color: #48bb78;
        }

        .section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .section-header {
            padding: 20px 25px;
            border-bottom: 2px solid #f7fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h2 {
            color: #2d3748;
            font-size: 1.3em;
        }

        .badge {
            background: #ecc94b;
            color: #744210;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f7fafc;
        }

        th {
            padding: 15px 20px;
            text-align: left;
            color: #718096;
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
        }

        td {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            color: #2d3748;
        }

        tr:hover {
            background: #f7fafc;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1em;
        }

        .user-details h4 {
            margin-bottom: 4px;
        }

        .user-details p {
            color: #718096;
            font-size: 0.9em;
        }

        .role-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: capitalize;
        }

        .role-badge.admin {
            background: #fed7d7;
            color: #c53030;
        }

        .role-badge.agent {
            background: #bee3f8;
            color: #2b6cb0;
        }

        .role-badge.viewer {
            background: #e9d8fd;
            color: #6b46c1;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .btn-approve {
            background: #48bb78;
            color: white;
        }

        .btn-approve:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(72, 187, 120, 0.3);
        }

        .btn-reject {
            background: #f56565;
            color: white;
            margin-left: 10px;
        }

        .btn-reject:hover {
            background: #e53e3e;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 101, 101, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }

        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #718096;
        }

        .timestamp {
            color: #a0aec0;
            font-size: 0.85em;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #718096;
        }

        .loading i {
            font-size: 2em;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #f0fff4;
            border: 1px solid #68d391;
            color: #276749;
        }

        .alert-error {
            background: #fff5f5;
            border: 1px solid #fc8181;
            color: #c53030;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }

            table {
                font-size: 0.85em;
            }

            th, td {
                padding: 12px 10px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-user-check"></i> Admin Approval Dashboard</h1>
        <p>Review and approve user registrations</p>
    </div>

    <div class="container">
        <div id="alert-box" class="alert"></div>

        <div class="stats">
            <div class="stat-card pending">
                <h3><i class="fas fa-clock"></i> Pending Approvals</h3>
                <div class="number" id="pending-count">0</div>
            </div>
            <div class="stat-card approved">
                <h3><i class="fas fa-check-circle"></i> Approved Users</h3>
                <div class="number" id="approved-count">0</div>
            </div>
            <div class="stat-card">
                <h3><i class="fas fa-users"></i> Total Users</h3>
                <div class="number" id="total-count">0</div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-hourglass-half"></i> Pending Approvals</h2>
                <span class="badge" id="pending-badge">0 Pending</span>
            </div>
            <div id="pending-list">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Loading pending approvals...</p>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h2><i class="fas fa-user-check"></i> Approved Users</h2>
            </div>
            <div id="approved-list">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>Loading approved users...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDKthkVZLmK5Y_wT0Jmx90UEkzJs_Pz9-I",
            authDomain: "plot-ai-87781.firebaseapp.com",
            databaseURL: "https://plot-ai-87781-default-rtdb.firebaseio.com",
            projectId: "plot-ai-87781",
            storageBucket: "plot-ai-87781.firebasestorage.app",
            messagingSenderId: "723228647195",
            appId: "1:723228647195:web:00693e31e923014e1efdbe"
        };

        // Initialize Firebase
        let auth, db;
        try {
            const app = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.database();
            console.log('✅ Firebase initialized');
            loadPendingApprovals();
            loadApprovedUsers();
        } catch (error) {
            console.error('❌ Firebase init failed:', error);
        }

        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('alert-box');
            alertBox.className = `alert alert-${type}`;
            alertBox.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 3000);
        }

        async function loadPendingApprovals() {
            try {
                const snapshot = await db.ref('pending_approvals').once('value');
                const data = snapshot.val();
                
                const pendingList = document.getElementById('pending-list');
                const pendingCount = document.getElementById('pending-count');
                const pendingBadge = document.getElementById('pending-badge');
                
                if (!data) {
                    pendingList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-check-circle"></i>
                            <h3>No Pending Approvals</h3>
                            <p>All caught up! No users waiting for approval.</p>
                        </div>
                    `;
                    pendingCount.textContent = '0';
                    pendingBadge.textContent = '0 Pending';
                    return;
                }

                const pendingUsers = Object.entries(data);
                pendingCount.textContent = pendingUsers.length;
                pendingBadge.textContent = `${pendingUsers.length} Pending`;

                let html = '<table><thead><tr>';
                html += '<th>User</th>';
                html += '<th>Role</th>';
                html += '<th>Requested</th>';
                html += '<th>Actions</th>';
                html += '</tr></thead><tbody>';

                pendingUsers.forEach(([uid, user]) => {
                    const firstName = user.firstName || user.name?.split(' ')[0] || 'User';
                    const lastName = user.lastName || user.name?.split(' ')[1] || '';
                    const initials = (firstName.charAt(0) + lastName.charAt(0)).toUpperCase();
                    const fullName = user.name || `${firstName} ${lastName}`;
                    const date = user.requestedAt ? new Date(user.requestedAt).toLocaleDateString() : 'N/A';
                    
                    html += `
                        <tr>
                            <td>
                                <div class="user-info">
                                    <div class="user-avatar">${initials}</div>
                                    <div class="user-details">
                                        <h4>${fullName}</h4>
                                        <p>${user.email || 'N/A'}</p>
                                    </div>
                                </div>
                            </td>
                            <td><span class="role-badge ${user.role}">${user.role || 'N/A'}</span></td>
                            <td><span class="timestamp">${date}</span></td>
                            <td>
                                <button class="btn btn-approve" onclick="approveUser('${uid}', '${fullName}', '${user.email || ''}')">
                                    <i class="fas fa-check"></i> Approve
                                </button>
                                <button class="btn btn-reject" onclick="rejectUser('${uid}', '${user.name}')">
                                    <i class="fas fa-times"></i> Reject
                                </button>
                            </td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                pendingList.innerHTML = html;

            } catch (error) {
                console.error('Error loading pending approvals:', error);
            }
        }

        async function loadApprovedUsers() {
            try {
                const snapshot = await db.ref('users').orderByChild('status').equalTo('active').once('value');
                const data = snapshot.val();
                
                const approvedList = document.getElementById('approved-list');
                const approvedCount = document.getElementById('approved-count');
                const totalCount = document.getElementById('total-count');
                
                if (!data) {
                    approvedList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-users"></i>
                            <h3>No Approved Users Yet</h3>
                            <p>Approved users will appear here.</p>
                        </div>
                    `;
                    approvedCount.textContent = '0';
                    totalCount.textContent = '0';
                    return;
                }

                const approvedUsers = Object.entries(data);
                approvedCount.textContent = approvedUsers.length;
                totalCount.textContent = approvedUsers.length;

                let html = '<table><thead><tr>';
                html += '<th>User</th>';
                html += '<th>Role</th>';
                html += '<th>Status</th>';
                html += '<th>Created</th>';
                html += '</tr></thead><tbody>';

                approvedUsers.forEach(([uid, user]) => {
                    const firstName = user.firstName || user.name?.split(' ')[0] || 'User';
                    const lastName = user.lastName || user.name?.split(' ')[1] || '';
                    const initials = (firstName.charAt(0) + lastName.charAt(0)).toUpperCase();
                    const fullName = user.name || `${firstName} ${lastName}`;
                    const date = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : 'N/A';
                    
                    html += `
                        <tr>
                            <td>
                                <div class="user-info">
                                    <div class="user-avatar">${initials}</div>
                                    <div class="user-details">
                                        <h4>${fullName}</h4>
                                        <p>${user.email || 'N/A'}</p>
                                    </div>
                                </div>
                            </td>
                            <td><span class="role-badge ${user.role}">${user.role}</span></td>
                            <td><span class="timestamp">✅ Active</span></td>
                            <td><span class="timestamp">${date}</span></td>
                        </tr>
                    `;
                });

                html += '</tbody></table>';
                approvedList.innerHTML = html;

            } catch (error) {
                console.error('Error loading approved users:', error);
            }
        }

        async function approveUser(uid, name, email) {
            if (!confirm(`Approve ${name} (${email})?`)) return;

            try {
                // Update user status directly to active (no verification code needed)
                await db.ref('users/' + uid).update({
                    status: 'active',
                    approvedAt: new Date().toISOString(),
                    verified: true,
                    verifiedAt: new Date().toISOString()
                });

                // Remove from pending approvals
                await db.ref('pending_approvals/' + uid).remove();

                // Show success message
                showAlert(`✅ ${name} approved and activated! They can now login immediately.`);
                
                console.log('✅ User approved:', email);
                
                // Reload lists
                loadPendingApprovals();
                loadApprovedUsers();

            } catch (error) {
                console.error('Error approving user:', error);
                showAlert('Failed to approve user: ' + error.message, 'error');
            }
        }

        async function rejectUser(uid, name) {
            if (!confirm(`Reject and delete ${name}'s registration?`)) return;

            try {
                // Delete user from authentication
                // Note: This requires Firebase Admin SDK or Cloud Function
                // For now, we'll just remove from database
                
                // Remove from users
                await db.ref('users/' + uid).remove();

                // Remove from pending approvals
                await db.ref('pending_approvals/' + uid).remove();

                showAlert(`${name}'s registration has been rejected.`);
                
                // Reload lists
                loadPendingApprovals();
                loadApprovedUsers();

            } catch (error) {
                console.error('Error rejecting user:', error);
                showAlert('Failed to reject user: ' + error.message, 'error');
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(() => {
            loadPendingApprovals();
            loadApprovedUsers();
        }, 30000);
    </script>
</body>
</html>
