<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sending Password Reset...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #1a2744;
            border: 1px solid #2a3f6f;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h1 { color: #ffffff; font-size: 28px; margin-bottom: 10px; }
        .spinner {
            border: 4px solid #2a3f6f;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            color: #8892b0;
            font-size: 16px;
            line-height: 1.6;
            margin: 20px 0;
        }
        .success-box {
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid #10b981;
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
        }
        .success-box h2 { color: #10b981; margin-bottom: 15px; }
        .success-box p { color: #ccd6f6; margin-bottom: 10px; }
        .login-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 16px 40px;
            background: #3b82f6;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 18px;
            transition: background 0.2s;
        }
        .login-btn:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Sending Password Reset Email</h1>
        <div class="spinner"></div>
        <p class="message">Sending reset link to r.k@at.world...</p>
        <div id="result"></div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyDKthkVZLmK5Y_wT0Jmx90UEkzJs_Pz9-I',
            authDomain: 'plot-ai-87781.firebaseapp.com',
            databaseURL: 'https://plot-ai-87781-default-rtdb.firebaseio.com',
            projectId: 'plot-ai-87781',
            storageBucket: 'plot-ai-87781.firebasestorage.app',
            messagingSenderId: '723228647195',
            appId: '1:723228647195:web:00693e31e923014e1efdbe',
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const email = 'r.k@at.world';

        try {
            await sendPasswordResetEmail(auth, email);

            document.getElementById('result').innerHTML = `
                <div class="success-box">
                    <h2>✅ Password Reset Email Sent!</h2>
                    <p><strong>Check your email inbox for:</strong><br>${email}</p>
                    <p style="margin-top: 15px;"><strong>Next Steps:</strong></p>
                    <ol style="text-align: left; color: #ccd6f6; margin-left: 20px; line-height: 2;">
                        <li>Open the email from Firebase</li>
                        <li>Click the "Reset Password" link</li>
                        <li>Set your new password to: <strong>maha2607</strong></li>
                        <li>Return to the login page</li>
                    </ol>
                    <a href="https://ai-plot-app.vercel.app/login" class="login-btn">
                        → Go to Login Page
                    </a>
                </div>
            `;

        } catch (error) {
            document.getElementById('result').innerHTML = `
                <div class="success-box" style="background: rgba(239, 68, 68, 0.1); border-color: #ef4444;">
                    <h2 style="color: #ef4444;">❌ Error</h2>
                    <p>${error.message}</p>
                    <p style="margin-top: 15px;">Please try again or use Guest mode.</p>
                    <a href="https://ai-plot-app.vercel.app/login" class="login-btn">
                        → Go to Login Page
                    </a>
                </div>
            `;
        }
    </script>
</body>
</html>
