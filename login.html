<!-- Corrected Login Form Handler in login.html -->
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const rememberMe = document.getElementById('remember-me')?.checked;
        const loginBtn = document.getElementById('login-btn');

        // Basic UI feedback
        loginBtn.disabled = true;
        loginBtn.textContent = 'Signing in...';

        // --- DEMO USERS FALLBACK (Always works offline) ---
        const demoUsers = [
            { email: 'admin@aiplot.com', password: 'admin123', name: 'Admin User', role: 'admin', status: 'active' },
            { email: 'agent@aiplot.com', password: 'agent123', name: 'John Smith', role: 'agent', status: 'active' },
            { email: 'emma@aiplot.com', password: 'agent123', name: 'Emma Wilson', role: 'agent', status: 'active' }
        ];

        const user = demoUsers.find(u => u.email === email && u.password === password && u.status === 'active');

        if (user) {
            // --- SUCCESS: Create consistent session ---
            const session = {
                email: user.email,
                name: user.name,
                role: user.role
                // No Firebase auth needed for demo
            };

            // Store session EXACTLY as app.js expects
            if (rememberMe) {
                localStorage.setItem('aiplot_session', JSON.stringify(session));
            } else {
                sessionStorage.setItem('aiplot_session', JSON.stringify(session));
            }

            showAlert('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);

        } else {
            // --- FAILURE ---
            showAlert('Invalid email or password. Try demo: admin@aiplot.com / admin123', 'error');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
        }
    });
</script>
